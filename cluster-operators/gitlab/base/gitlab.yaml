apiVersion: apps.gitlab.com/v1beta1
kind: GitLab
metadata:
  name: gitlab
  namespace: gitlab-operator
spec:
  chart:
    values:
      global:
        hosts:
          domain: k0s.mdoktor.foo
          gitlab:
            name: gitlab.mdoktor.foo
            https: false
          registry:
            name: registry.mdoktor.foo
            https: false
          minio:
            name: minio.mdoktor.foo
            https: false
          smartcard:
            name: smartcard.mdoktor.foo
          kas:
            name: kas.mdoktor.foo
          pages:
            name: pages.mdoktor.foo
            https: false
          ssh: gitlab.mdoktor.foo
        ingress:
          configureCertmanager: false
          class: traefik
        rails:
          bootsnap:
            enabled: false
        shell:
          # Configure the clone link in the UI to include the high-numbered NodePort
          # value from below (`gitlab.gitlab-shell.service.nodePort`)
          port: 32022
      # Don't use certmanager, we'll self-sign
      installCertmanager: false
      # Use the `ingress` addon, not our Ingress (can't map 22/80/443)
      nginx-ingress:
        enabled: false
      # Save resources, only 3 CPU
      prometheus:
        install: false
      gitlab-runner:
        install: false
      # Reduce replica counts, reducing CPU & memory requirements
      gitlab:
        webservice:
          minReplicas: 1
          maxReplicas: 1
        sidekiq:
          minReplicas: 1
          maxReplicas: 1
        gitlab-shell:
          minReplicas: 1
          maxReplicas: 1
          # Map gitlab-shell to a high-numbered NodePort to support cloning over SSH since
          # Minikube takes port 22.
          service:
            type: NodePort
            nodePort: 32022
      registry:
        hpa:
          minReplicas: 1
          maxReplicas: 1
