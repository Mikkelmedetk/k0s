apiVersion: apps.gitlab.com/v1beta1
kind: GitLab
metadata:
  name: gitlab
  namespace: gitlab-operator
spec:
  chart:
    version: 9.8.8
    values:
      global:
        hosts:
          domain: k0s.mdoktor.foo
          gitlab:
            name: gitlab.k0s.mdoktor.foo
            https: false
          registry:
            name: registry.k0s.mdoktor.foo
            https: false
          minio:
            name: minio.k0s.mdoktor.foo
            https: false
          smartcard:
            name: smartcard.k0s.mdoktor.foo
          kas:
            name: kas.k0s.mdoktor.foo
          pages:
            name: pages.k0s.mdoktor.foo
            https: false
          ssh: gitlab.k0s.mdoktor.foo
        ingress:
          configureCertmanager: false
          class: traefik
          tls:
            enabled: true
            secretName: gitlab-tls
        rails:
          bootsnap:
            enabled: false
        shell:
          # Configure the clone link in the UI to include the high-numbered NodePort
          # value from below (`gitlab.gitlab-shell.service.nodePort`)
          port: 32022
      registry:
        enabled: false
      pages:
        enabled: false
        kas:
          enabled: false
      smartcard:
        enabled: false
      # Don't use certmanager, we'll self-sign
      installCertmanager: false
      # Use the `ingress` addon, not our Ingress (can't map 22/80/443)
      nginx-ingress:
        enabled: false
      # Save resources, only 3 CPU
      prometheus:
        install: false
      gitlab-runner:
        install: true
      # Reduce replica counts, reducing CPU & memory requirements
      gitlab:
        webservice:
          minReplicas: 1
          maxReplicas: 1
          workerProcesses: 1 # default is 2
        sidekiq:
          minReplicas: 1
          maxReplicas: 1
          concurrency: 5
        gitlab-shell:
          minReplicas: 1
          maxReplicas: 1
          # Map gitlab-shell to a high-numbered NodePort to support cloning over SSH since
          # Minikube takes port 22.
          service:
            type: NodePort
            nodePort: 32022
